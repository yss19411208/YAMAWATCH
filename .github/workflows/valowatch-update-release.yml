name: Build VALOWATCH update

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-update:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Write tokenless update environment
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path installer -Force | Out-Null
          $envLines = @(
            "VALOWATCH_UPDATE_CHECK_ENABLED=true"
            "VALOWATCH_UPDATE_REPOSITORY=${{ github.repository }}"
            "VALOWATCH_UPDATE_CURRENT_VERSION=0.1.2"
            "VALOWATCH_UPDATE_BRANCH=main"
            "VALOWATCH_UPDATE_CURRENT_COMMIT=${{ github.sha }}"
            "VALOWATCH_GITHUB_TOKEN="
            "VALOWATCH_TRANSCRIPTION_ENABLED=true"
            "VALOWATCH_TRANSCRIPTION_ENGINE=vosk"
            "VALOWATCH_TRANSCRIPTION_MODEL_PATH="
          )
          Set-Content -Path installer/.env -Value $envLines -Encoding UTF8

      - name: Download offline transcription model
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path .\models -Force | Out-Null
          $modelZipPath = ".\models\vosk-model-small-ja-0.22.zip"
          try {
            Invoke-WebRequest `
              -Uri "https://alphacephei.com/vosk/models/vosk-model-small-ja-0.22.zip" `
              -OutFile $modelZipPath

            Add-Type -AssemblyName System.IO.Compression.FileSystem
            $modelZip = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $modelZipPath))
            try {
              if ($modelZip.Entries.Count -le 0) {
                throw "Vosk model zip is empty."
              }
            }
            finally {
              $modelZip.Dispose()
            }
          }
          catch {
            Write-Warning "Offline transcription model download failed. The update release will continue without an embedded Vosk model. Existing installed data models can still be used. $($_.Exception.Message)"
            Remove-Item -LiteralPath $modelZipPath -Force -ErrorAction SilentlyContinue
          }

      - name: Download FFmpeg screen streaming tool
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path .\tools -Force | Out-Null
          $ffmpegZipPath = ".\tools\ffmpeg-release-essentials.zip"
          $ffmpegExtractPath = ".\tools\ffmpeg-extract"
          $ffmpegShaUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip.sha256"
          $ffmpegZipUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"

          $shaText = Invoke-RestMethod -Uri $ffmpegShaUrl
          $expectedSha = [regex]::Match([string]$shaText, "\b[a-fA-F0-9]{64}\b").Value.ToUpperInvariant()
          if ([string]::IsNullOrWhiteSpace($expectedSha)) {
            throw "FFmpeg SHA-256 digest could not be parsed."
          }

          Invoke-WebRequest -Uri $ffmpegZipUrl -OutFile $ffmpegZipPath
          $actualSha = (Get-FileHash -Path $ffmpegZipPath -Algorithm SHA256).Hash.ToUpperInvariant()
          if ($actualSha -ne $expectedSha) {
            throw "FFmpeg SHA-256 mismatch. Expected $expectedSha but got $actualSha."
          }

          Remove-Item -LiteralPath $ffmpegExtractPath -Recurse -Force -ErrorAction SilentlyContinue
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory((Resolve-Path $ffmpegZipPath), (Join-Path (Get-Location) $ffmpegExtractPath))
          $ffmpegExe = Get-ChildItem -Path $ffmpegExtractPath -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          if ($null -eq $ffmpegExe) {
            throw "Downloaded FFmpeg archive did not contain ffmpeg.exe."
          }

          Copy-Item -LiteralPath $ffmpegExe.FullName -Destination .\tools\ffmpeg.exe -Force
          $header = [System.IO.File]::ReadAllBytes((Resolve-Path .\tools\ffmpeg.exe))[0..1]
          if ($header[0] -ne 0x4D -or $header[1] -ne 0x5A) {
            throw "Extracted ffmpeg.exe is not a Windows PE executable."
          }

      - name: Publish VALOWATCH agents for embedding
        shell: pwsh
        run: |
          dotnet publish .\src\VALOWATCH.Updater\VALOWATCH.Updater.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            "-p:InformationalVersion=0.1.2+${{ github.sha }}" `
            -o .\updater

          dotnet publish .\src\VALOWATCH.StartAgent\VALOWATCH.StartAgent.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            "-p:InformationalVersion=0.1.2+${{ github.sha }}" `
            -o .\start

          New-Item -ItemType Directory -Path github -Force | Out-Null
          Copy-Item -LiteralPath .\updater\VALOWATCH_Update.exe -Destination .\github\GITHUB.exe -Force

      - name: Publish VALOWATCH app
        shell: pwsh
        run: |
          dotnet publish .\src\VALOWATCH\VALOWATCH.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            "-p:InformationalVersion=0.1.2+${{ github.sha }}" `
            -p:IncludeSourceRevisionInInformationalVersion=false `
            -o .\exe

      - name: Prepare release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item -LiteralPath .\exe\VALOWATCH.exe -Destination .\release\VALOWATCH_App.exe -Force
          Copy-Item -LiteralPath .\updater\VALOWATCH_Update.exe -Destination .\release\VALOWATCH_Update.exe -Force
          Copy-Item -LiteralPath .\github\GITHUB.exe -Destination .\release\GITHUB.exe -Force
          Copy-Item -LiteralPath .\start\VALOWATCH_Start.exe -Destination .\release\VALOWATCH_Start.exe -Force

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          $releaseTag = "valowatch-${{ github.sha }}"
          gh release view $releaseTag --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $releaseTag --repo "${{ github.repository }}" --yes --cleanup-tag
          }

          gh release create $releaseTag `
            .\release\VALOWATCH_App.exe `
            .\release\VALOWATCH_Update.exe `
            .\release\GITHUB.exe `
            .\release\VALOWATCH_Start.exe `
            --repo "${{ github.repository }}" `
            --target "${{ github.sha }}" `
            --title "VALOWATCH update ${{ github.sha }}" `
            --notes "Automated VALOWATCH update build for ${{ github.sha }}"
